name: ci

on:
  push: {}
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector@sha256:9d2e61c7352b9e9f4798df5fd9a498f043f4cda1cdacc707de3d198650f4321e
        env:
          POSTGRES_DB: mongars
          POSTGRES_USER: mongars
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mongars -d mongars"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      MONGARS_ENVIRONMENT: test
      MONGARS_DATABASE_URL: postgresql+psycopg://mongars:ci-only-password@127.0.0.1:5432/mongars
      MONGARS_TEST_DATABASE_URL: postgresql+psycopg://mongars:ci-only-password@127.0.0.1:5432/mongars
      MONGARS_OLLAMA_BASE_URL: http://127.0.0.1:11434

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.30"
          enable-cache: true

      - name: Verify lockfile and install dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra dev --extra documents

      - name: Lint and type-check
        run: |
          shellcheck scripts/*.sh
          shellcheck deploy/*/*.sh
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy src

      - name: Audit Python source and dependencies
        run: |
          uv run bandit -q -r src
          uv run pip-audit

      - name: Exercise migrations
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
          uv run alembic check

      - name: Run unit tests
        run: uv run pytest -q tests/unit

      - name: Run PostgreSQL integration tests
        run: uv run pytest -q tests/integration

      - name: Enforce critical-path branch coverage
        run: >-
          uv run pytest -q tests/unit tests/integration
          --cov=mongars
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.7.3
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

      - name: Validate Compose model
        run: |
          install -m 0700 -d secrets
          printf '%s\n' 'ci-only-password' > secrets/postgres_password.txt
          printf '%s\n' 'ci-api-token' > secrets/api_token.txt
          printf '%s\n' 'ci-approval-hmac-key' > secrets/approval_hmac_key.txt
          printf '%s\n' 'ci-searxng-secret' > secrets/searxng_secret.txt
          chmod 0640 secrets/*.txt
          docker compose config --quiet
          python3 scripts/check_deployment_contract.py

      - name: Validate Caddy and bounded search egress
        run: |
          deploy/caddy/check.sh
          deploy/egress-proxy/check.sh
          deploy/searxng/check.sh

      - name: Build production image
        run: docker build --tag mongars:ci .

      - name: Verify production image runs as non-root
        run: >-
          docker run --rm --entrypoint python mongars:ci
          -c 'import os, mongars; assert os.getuid() != 0'

  mobile:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install locked mobile dependencies
        run: npm ci

      - name: Lint mobile app
        run: npm run lint

      - name: Type-check mobile app
        run: npm run typecheck

      - name: Test mobile app
        run: npm test

      - name: Audit mobile dependencies
        run: npm audit --audit-level=high

  deployment-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Exercise HTTPS, authentication, and required web search
        run: scripts/deployment_smoke.sh

      - name: Upload deployment-smoke evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.7.3
        with:
          name: deployment-smoke-evidence
          path: artifacts/deployment-smoke-evidence.json
          if-no-files-found: error
          retention-days: 14

  arm64-profile-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Prepare build builder for multi-platform validation
        run: docker buildx create --name mongars-ci --use --driver docker-container || true

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.30"
          enable-cache: true

      - name: Verify lockfile and install dependencies
        run: |
          uv lock --check
          uv sync --frozen --extra dev --extra documents

      - name: Confirm overlay files are compose-only image overrides
        run: |
          python3 - <<'PY'
import re
from pathlib import Path


def load_lines(path: str) -> list[str]:
    return [
        line.strip()
        for line in Path(path).read_text(encoding="utf-8").splitlines()
        if line.strip() and not line.lstrip().startswith("#")
    ]


def assert_image_override(path: str) -> None:
    lines = load_lines(path)
    if len(lines) != 3:
        raise SystemExit(f"{path} is not a minimal overlay file")
    if lines[0] != "services:":
        raise SystemExit(f"{path} missing services stanza")
    if lines[1] != "ollama:":
        raise SystemExit(f"{path} must only override the ollama service")
    if not re.match(r"^image:\s+\$\{MONGARS_OLLAMA_IMAGE_[A-Z]+:", lines[2]):
        raise SystemExit(f"{path} must only override ollama image")


assert_image_override("compose.arm64.yaml")
assert_image_override("compose.jetson.yaml")
PY

      - name: Validate ARM64 Compose overlay
        run: docker compose -f compose.yaml -f compose.arm64.yaml --profile arm64 config --quiet

      - name: Validate Jetson Compose overlay
        run: docker compose -f compose.yaml -f compose.jetson.yaml --profile jetson config --quiet

      - name: Build ARM64 image
        run: docker buildx build --platform linux/arm64 --load -t mongars:ci-arm64 .

      - name: Run unit tests
        run: uv run pytest -q tests/unit

      - name: Save ARM64 profile evidence
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
import json
import os
import platform
from datetime import datetime, timezone

with open("artifacts/arm64-profile-validation.json", "w", encoding="utf-8") as handle:
    json.dump(
        {
            "profile": "arm64",
            "platform": "linux/arm64",
            "validation_step": "compose-arm64-config-unit-tests",
            "python_version": platform.python_version(),
            "runner": os.getenv("RUNNER_OS"),
            "timestamp": datetime.now(timezone.utc).isoformat(),
        },
        handle,
        indent=2,
        sort_keys=True,
    )
PY

      - name: Upload ARM64 profile evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.7.3
        with:
          name: arm64-profile-validation
          path: artifacts/arm64-profile-validation.json
          if-no-files-found: error
          retention-days: 14
