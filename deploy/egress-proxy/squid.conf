visible_hostname mongars-search-egress
http_port 3128
pid_filename /run/squid/squid.pid

# This proxy is a policy boundary, not a cache.
cache deny all
cache_mem 32 MB
maximum_object_size_in_memory 512 KB
cache_log stdio:/dev/stderr
access_log stdio:/dev/stdout
cache_store_log none
coredump_dir /tmp

# Restrict the forward proxy to ordinary public web ports.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Deny loopback, private, shared, link-local, documentation, benchmark,
# multicast, reserved, and metadata destinations after Squid resolves the
# hostname. This also blocks Docker host gateways and DNS-rebinding answers
# that resolve into one of these ranges.
acl blocked_ipv4 dst 0.0.0.0/8
acl blocked_ipv4 dst 10.0.0.0/8
acl blocked_ipv4 dst 100.64.0.0/10
acl blocked_ipv4 dst 127.0.0.0/8
acl blocked_ipv4 dst 169.254.0.0/16
acl blocked_ipv4 dst 172.16.0.0/12
acl blocked_ipv4 dst 192.0.0.0/24
acl blocked_ipv4 dst 192.0.2.0/24
acl blocked_ipv4 dst 192.88.99.0/24
acl blocked_ipv4 dst 192.168.0.0/16
acl blocked_ipv4 dst 198.18.0.0/15
acl blocked_ipv4 dst 198.51.100.0/24
acl blocked_ipv4 dst 203.0.113.0/24
acl blocked_ipv4 dst 224.0.0.0/4
acl blocked_ipv4 dst 240.0.0.0/4
acl blocked_ipv4 dst 168.63.129.16/32

acl blocked_ipv6 dst ::/128
acl blocked_ipv6 dst ::1/128
acl blocked_ipv6 dst 64:ff9b::/96
acl blocked_ipv6 dst 64:ff9b:1::/48
acl blocked_ipv6 dst 100::/64
acl blocked_ipv6 dst 2001::/32
acl blocked_ipv6 dst 2001:10::/28
acl blocked_ipv6 dst 2001:db8::/32
acl blocked_ipv6 dst 2002::/16
acl blocked_ipv6 dst fc00::/7
acl blocked_ipv6 dst fe80::/10
acl blocked_ipv6 dst fec0::/10
acl blocked_ipv6 dst ff00::/8

http_access deny blocked_ipv4
http_access deny blocked_ipv6
http_access allow all
http_access deny all

forwarded_for delete
pinger_enable off
request_header_access X-Forwarded-For deny all
request_header_access Via deny all
